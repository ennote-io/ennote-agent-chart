apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ennote-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ennote-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ennote-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ennote-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ennote-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "ennote-agent.fullname" . }}-config
          env:
            {{- if or .Values.ennote.auth.existingSecretName .Values.ennote.auth.token }}
            - name: ENNOTE_AUTH_TOKEN
              {{- if .Values.ennote.auth.existingSecretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ennote.auth.existingSecretName }}
                  key: {{ default "token" .Values.ennote.auth.existingSecretKey }}
              {{- else }}
              value: {{ .Values.ennote.auth.token | quote }}
              {{- end }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}